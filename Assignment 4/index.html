<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
      rel="stylesheet"
    />
    <link
      href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="styles.css"
    />
  </head>
  <body>
    <main>
      <div class="col1">
        <div class="menu">
          <p>Clients</p>
          <p>Research</p>
          <p>Portfolio</p>
          <p>Podcast</p>
        </div>
      </div>
      <div class="col2">
        <div class="about">
          <img
            src="./assets/logo.png"
            alt=""
          />
          <p>About Me</p>
        </div>
        <div class="portfolio-card">
          <div class="photo">
            <div class="outer">
              <div class="inner">
                <img
                  src="./assets/person1.png"
                  alt=""
                />
              </div>
            </div>
          </div>

          <div class="intro">
            <p>Im,</p>
            <h1>Jon</h1>
            <h1>Daniel</h1>
          </div>

          <div class="mail">
            <p>inquiry@jondaniel.design</p>
            <p><i class="ri-inbox-2-line"></i></p>
          </div>

          <!-- <div class="border"></div> -->
          <div class="circular">
            <img
              src="./assets/circle1.png"
              alt=""
            />
          </div>
        </div>
      </div>
      <div class="col3">
        <div class="row1">
          <img
            src="./assets/Portfolio.png"
            alt=""
          />
        </div>
        <div class="row2">
          <div class="swon_container">
            <img
              src="./assets/swon.png"
              alt=""
            />
            <div class="glass-effect">
              <i class="ri-play-fill"></i>
            </div>
          </div>
          <div class="right">
            <div class="box1 stat-card">
              <img
                class="corner-icon"
                src="./assets/abc.svg"
                alt=""
              />
              <h1>251</h1>
              <p>Projects</p>
            </div>
            <div class="box2 stat-card">
              <img
                class="corner-icon"
                src="./assets/abc.svg"
                alt=""
              />
              <h1>156</h1>
              <p>Awards</p>
            </div>
          </div>
        </div>
        <div class="row3">
          <div class="left">
            <img
              class="corner-icon"
              src="./assets/border-corner-square.svg"
              alt=""
            />
            <img
              src="./assets/apple.png"
              alt=""
            />
            <p>Clients</p>
          </div>
          <div class="right">
            <div class="box1">
              <img
                src="./assets/3d_Object.png"
                alt=""
              />
            </div>
            <div class="box">
              <img
                class="corner-icon"
                src="./assets/abc.svg"
                alt=""
              />
              <div class="text">
                <h1>172</h1>
                <p>Global Design</p>
                <p>Awards.</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
