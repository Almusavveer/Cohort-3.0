<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Bento Grid</title>
    <link
      rel="stylesheet"
      href="./styles.css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="bento">
      <div class="radius one">
        <div class="row1">
          <p>Brand of Designing</p>
          <p><i class="ri-more-line"></i></p>
        </div>
        <div class="row2">
          <div class="circle">
            <h1>75%</h1>
            <p>Progress</p>
          </div>
        </div>
        <div class="row3">
          <h1>2.5k</h1>
          <p>263 contributions in the last year</p>
        </div>
        <div class="row4">
          <button>View report <i class="ri-arrow-right-s-line"></i></button>
        </div>
      </div>
      <div class="radius two">
        <div class="left">
          <h1>4.875</h1>
          <p>Project Views last year</p>
          <div class="row">
            <div class="badge">
              <img
                src="./assets/growth-ic.png"
                alt=""
              />
              <p>+15%</p>
            </div>
            <p>vs last year</p>
          </div>
        </div>
        <div class="right">
          <div class="circle">
            <img
              src="./assets/heart.png"
              alt=""
            />
          </div>
        </div>
      </div>
      <div class="radius three">
        <div class="left">
          <p>New Users</p>
          <h1>57k</h1>
          <p class="growth">+10% <i class="ri-arrow-right-up-long-line"></i></p>
          <p class="last">vs last month</p>
        </div>
        <div class="right">
          <img
            src="./assets/people.png"
            alt=""
          />
        </div>
      </div>
      <div class="radius four"></div>
      <div class="radius five"></div>
      <div class="radius six"></div>
      <div class="radius seven">
        <div class="top">
          <div class="left">
            <p class="font">Font</p>
            <p>Sk-Modernist</p>
          </div>
          <div class="right">
            <p>Aa</p>
          </div>
        </div>
        <div class="center">
          <div class="box1 size"></div>
          <div class="box2 size"></div>
          <div class="box3 size"></div>
          <div class="box4 size"></div>
        </div>
        <div class="bottom">
          <p>View all fonts</p>
          <i class="ri-arrow-right-s-line"></i>
        </div>
      </div>
      <div class="radius eight">
        <div class="left">
          <h2>We Build Future of Design Industry</h2>
          <p>Creafting Meaningful UX/UI Design</p>
          <button>Explore more <i class="ri-arrow-right-s-line"></i></button>
        </div>
        <div class="right">
          <img
            src="./assets/model-3d.webp"
            alt=""
          />
          <div class="circle"></div>
        </div>
      </div>
      <div class="radius nine">
        <img
          src="./assets/logo.png"
          alt=""
        />
        <div class="title">
          <h1>CUBO</h1>
          <p>Digital Studio</p>
        </div>
        <button>Discover more <i class="ri-arrow-right-s-line"></i></button>
      </div>
    </div>
  </body>
</html>
