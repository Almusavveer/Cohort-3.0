<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Squid Game - Watch Now</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header -->
     <div class="main">
    <header class="header">
        <a href="#" class="logo-link">
            <img src="./assets/logo.png" alt="Squid Game" class="logo">
        </a>
        
        <nav class="nav">
            <a href="#">About</a>
            <a href="#" class="active">Watch now</a>
            <a href="#">Actors</a>
            <a href="#">Contact</a>
        </nav>
        
        <button class="menu-btn">
            <i class="ri-menu-3-line"></i>
        </button>
    </header>

    <!-- Main Hero Section -->
    <main class="hero">
        <div class="hero-left">
            <img src="./assets/logo.png" alt="Squid Game Logo" class="main-title">
            <p class="description">
                Action / Thriller / Drama Series directed by Dong-hyuk Hwang<br>
                Season 1: 9 Episodes
            </p>
            <div class="actions">
                <button class="btn-primary">
                    <span class="icon-circle">
                        <i class="ri-play-fill"></i>
                    </span>
                    Play Now
                </button>
                <button class="btn-outline">
                    <span class="icon-play">
                        <i class="ri-play-line"></i>
                    </span>
                    Watch Trailer
                </button>
            </div>
        </div>

        <div class="scroll-indicator">
            <span>SCROLL</span>
            <div class="line"></div>
        </div>

        <div class="hero-right">
            <img src="./assets/model.png" alt="Guard" class="character">
        </div>

        <div class="socials">
            <a href="#">
                <i class="ri-twitter-line"></i>
            </a>
            <a href="#">
                <i class="ri-instagram-line"></i>
            </a>
            <a href="#">
                <i class="ri-facebook-line"></i>
            </a>
        </div>
    </main>

    <!-- Cards Section -->
    <section class="cards-section">
        <div class="cards-wrapper">
            <div class="card">
                <img src="./assets/one.jpg.jpeg" alt="Episode Image 1">
                <div class="play-btn">
                    <i class="ri-play-fill"></i>
                </div>
            </div>
            <div class="card">
                <img src="./assets/two.jpg.jpeg" alt="Episode Image 2">
                <div class="play-btn">
                    <i class="ri-play-fill"></i>
                </div>
            </div>
            <div class="card">
                <img src="./assets/three.jpg.jpeg" alt="Episode Image 3">
                <div class="play-btn">
                    <i class="ri-play-fill"></i>
                </div>
            </div>
        </div>
    </section>
    </div>
</body>
</html>
