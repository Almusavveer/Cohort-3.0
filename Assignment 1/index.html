<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment No 1</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <div class="left-bg"></div>
        <div class="right-bg"></div>
        
        <img src="./pokemon.png" alt="Pokemon Logo" class="logo">
        
        <div class="menu-icon">
            <div class="line line1"></div>
            <div class="line line2"></div>
            <div class="line line3"></div>
        </div>
        
        <img src="./pokeball-pokemon-catch.svg" alt="Pokeball Watermark" class="pokeball-watermark">

        <div class="content">
            <div class="subtitle">POKEMON GEN I</div>
            <div class="title">Pikachu</div>
            <div class="description">
                Pikachu is an Electric-type Pokémon introduced
                in Generation I. Pikachu are small, chubby,
                and incredibly cute mouse-like Pokémon.
                They are almost completely covered by
                yellow fur.
            </div>
            <div class="pagination">
                <div class="dash"></div>
                <div class="page-number">01 / 08</div>
            </div>
        </div>

        <img src="./pickachu.png" alt="Pikachu" class="pikachu-img">

        <div class="dots">
            <div class="dot dot1 active"></div>
            <div class="dot dot2"></div>
            <div class="dot dot3"></div>
            <div class="dot dot4"></div>
            <div class="dot dot5"></div>
        </div>
    </div>
</body>
</html>
